name: Build Native Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Build APK with Gradle
      run: |
        if [ -f "./gradlew" ]; then
          chmod +x ./gradlew
          ./gradlew assembleDebug
        else
          echo "Gradlew not found, creating a basic build fallback..."
          # في حال عدم وجود ملف الـ wrapper محلياً، سيقوم السيرفر بتهيئته تلقائياً
          gradle assembleDebug
        fi

    - name: Upload Compiled APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Native-Survey-App
        path: app/build/outputs/apk/debug/app-debug.apk
